<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamis - Workout Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            margin: 0;
            text-align: center;
            color: #333;
        }
        .container {
            padding: 40px 20px;
            max-width: 600px;
            margin: auto;
        }
        img {
            width: 100px;
            border-radius: 20px;
        }
        h1 {
            margin-top: 20px;
        }
        p {
            font-size: 18px;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 15px 25px;
            background: #007AFF;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
        }
        .features {
            text-align: left;
            margin-top: 30px;
        }
        .footer {
            margin-top: 50px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">

    <img src="logo.png" alt="Dynamis Logo">

    <h1>Dynamis</h1>
    <p>Track your workouts. Build real progress.</p>

    <a href="#" class="btn">Download on App Store</a>

    <div class="features">
        <h2>Features</h2>
        <ul>
            <li>Track sets, reps and weights</li>
            <li>Apple Watch workout timer</li>
            <li>Monitor your progress and PRs</li>
            <li>Simple and clean interface</li>
        </ul>
    </div>

    <a href="/privacy-policy/" class="btn">Privacy Policy</a>
    <a href="/privacy-policy/support.html" class="btn">Support</a>

    <div class="footer">
        <p>&copy; 2026 Dynamis App</p>
    </div>

</div>

</body>
</html>
